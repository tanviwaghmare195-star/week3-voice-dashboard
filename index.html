<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Activated Media Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎬 Voice Activated Media Dashboard</h1>
        <p>Search your favorite TV shows using text or voice.</p>
    </header>

    <!-- Search Section -->
    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Search TV Shows..."
        >

        <button id="searchBtn">
            Search
        </button>

        <button id="voiceBtn">
            🎤 Speak
        </button>

    </section>

    <!-- Status -->
    <div id="status"></div>

    <!-- Results -->
    <section id="results" class="results"></section>

    <hr>

    <!-- Contact Form -->
    <section class="form-section">

        <h2>Contact Form</h2>

        <form id="contactForm">

            <div class="form-group">

                <label>Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter your name"
                >

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                >

            </div>

            <div class="form-group">

                <label>Phone</label>

                <input
                    type="text"
                    id="phone"
                    placeholder="Enter phone number"
                >

            </div>

            <div class="form-group">

                <label>Message</label>

                <textarea
                    id="message"
                    rows="5"
                    placeholder="Write your message..."
                ></textarea>

            </div>

            <button type="submit">
                Submit
            </button>

        </form>

        <div id="formErrors"></div>

    </section>

    <script src="api.js"></script>
<script src="speech.js"></script>
<script src="validation.js"></script>
<script src="app.js"></script>
</body>
</html>
